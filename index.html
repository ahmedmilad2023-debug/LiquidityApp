<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto SMC Signals V1</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>

<header class="topbar">

<div class="logo">
Crypto SMC Signals
</div>

<div class="market-info">

<div class="symbol-box">

<label>Pair</label>

<select id="symbolSelect">

<option value="BTCUSDT">BTCUSDT</option>

<option value="ETHUSDT">ETHUSDT</option>

<option value="SOLUSDT">SOLUSDT</option>

<option value="BNBUSDT">BNBUSDT</option>

<option value="XRPUSDT">XRPUSDT</option>

</select>

</div>

<div class="timeframe-box">

<label>Timeframe</label>

<select id="intervalSelect">

<option value="1m">1 Minute</option>

<option value="5m">5 Minutes</option>

<option value="15m">15 Minutes</option>

<option value="1h" selected>1 Hour</option>

<option value="4h">4 Hours</option>

</select>

</div>

<div class="price-box">

<div class="title">
Live Price
</div>

<div id="livePrice">
Loading...
</div>

</div>

</div>

</header>

<main class="container">

<section class="chart-section">

<div id="chart"></div>

</section>

<aside class="sidebar">

<div class="panel">

<h2>
Signal Status
</h2>

<div class="status waiting">

Waiting for setup...

</div>

</div>

<div class="panel">

<h2>

Current Signal

</h2>

<div class="signal-row">

<span>Type</span>

<strong id="signalType">
--
</strong>

</div>

<div class="signal-row">

<span>Entry</span>

<strong id="entryPrice">
--
</strong>

</div>

<div class="signal-row">

<span>Stop Loss</span>

<strong id="stopLoss">
--
</strong>

</div>

<div class="signal-row">

<span>Take Profit</span>

<strong id="takeProfit">
--
</strong>

</div>

<div class="signal-row">

<span>Reason</span>

<strong id="signalReason">
Waiting...
</strong>

</div>

</div>

<div class="panel">

<h2>

Open Signals

</h2>

<div id="openSignals">

No active trades

</div>

</div>

<div class="panel">

<h2>

Closed Signals

</h2>

<div id="closedSignals">

No history

</div>

</div>

<div class="panel">

<h2>

System Log

</h2>

<div id="logBox">

Application Started...

</div>

</div>

</aside>

</main>

<footer>

Crypto SMC Signals V1

</footer>

<script src="app.js"></script>

</body>
</html>
